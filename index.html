<!doctype html>
<html lang="it" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Studio Legale Villa | Assistenza Legale d'Eccellenza</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&display=swap" rel="stylesheet">
  </head>
  <body class="bg-background text-zinc-300 font-sans antialiased min-h-[100dvh]">
    <div id="root"></div>
    <!-- Global Noise Filter (Performance-optimized, fixed) -->
    <div style="position: fixed; inset: 0; z-index: 9999; pointer-events: none; opacity: 0.05;">
      <svg width="100%" height="100%">
        <filter id="noise">
          <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
        </filter>
        <rect width="100%" height="100%" filter="url(#noise)"/>
      </svg>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
